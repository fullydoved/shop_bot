<div class="border rounded-lg p-4 project-row" id="project-row-{{ project.id }}">
    <div class="flex gap-4 items-start">
        <div class="flex-1 space-y-2">
            <input type="text" name="name" value="{{ project.name }}"
                   class="w-full border rounded px-3 py-2 font-semibold focus:outline-none focus:ring-2 focus:ring-green-500"
                   onchange="markProjectDirty({{ project.id }})">
            <textarea name="description" rows="2" placeholder="Description..."
                      class="w-full border rounded px-3 py-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500"
                      onchange="markProjectDirty({{ project.id }})">{{ project.description }}</textarea>
        </div>
        <div class="flex flex-col gap-2 items-end">
            <select name="status" class="border rounded px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                    onchange="markProjectDirty({{ project.id }})">
                <option value="idea" {% if project.status == 'idea' %}selected{% endif %}>Idea</option>
                <option value="active" {% if project.status == 'active' %}selected{% endif %}>Active</option>
                <option value="paused" {% if project.status == 'paused' %}selected{% endif %}>Paused</option>
                <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completed</option>
            </select>
            <div class="flex items-center gap-2">
                <button type="button" onclick="saveProject({{ project.id }})"
                        class="save-btn hidden text-green-600 hover:text-green-800" data-project-id="{{ project.id }}" title="Save">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </button>
                <button type="button" onclick="deleteProject({{ project.id }})"
                        class="text-red-400 hover:text-red-600" title="Delete">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                </button>
                <span class="status-msg text-sm" data-project-id="{{ project.id }}"></span>
            </div>
        </div>
    </div>
</div>
